name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Release tags must pass the same quality gates as normal CI.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run preflight
      - run: npm test
      - run: npm run build
